{% extends "!theme/page.html" %}

{% block content %}
  <!-- Hidden utility pages should remain available without polluting search. -->
  <main id="site-main" class="content"{% if page.status != "hidden" %} data-pagefind-body{% endif %}>
    <article class="post">
      <div class="inner">
        <section class="post-content">
          {{ page.content }}
        </section>
      </div>
    </article>
  </main>
{% endblock content %}
